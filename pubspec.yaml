name: task_management_app
description: Standalone Chemplast task management Flutter app (not inside TaskManagementApp web repo).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.6.2
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1
  logger: ^2.5.0
  flutter_slidable: ^3.1.1
  shimmer: ^3.0.0
  flutter_secure_storage: ^10.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/env/app.env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
